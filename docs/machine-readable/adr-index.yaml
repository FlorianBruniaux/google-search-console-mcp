  - id: ADR-0014
    date: 2026-06-22
    criticite: C2
    domaine: Cross-platform
    titre: _normalize_url() pour matcher les URLs GSC (absolues) avec GA4 (chemins)
    tags: [cross-platform, normalize-url, gsc, ga4, url-matching, traffic_health_check]
    sources:
      - "commit `823013f` (2026-06-22 : feat: add cross-platform GSC+GA4 tools)"
      - "src/gsc_mcp/tools/cross.py"
    context: >
      GSC retourne des URLs absolues (https://example.com/page), GA4 retourne des chemins (/page).
      _normalize_url() supprime le schéma, le host, les query params et le trailing slash
      pour que les deux sources se joignent correctement sur la même clé.
    engagement_rate: "Dérivé comme engaged_sessions / sessions (GA4 ne fournit pas ce ratio directement)."

  - id: ADR-0015
    date: 2026-06-24
    criticite: C2
    domaine: GA4
    titre: _build_dimension_filter() pour filtres hostname et country dans les outils GA4
    tags: [ga4, dimension-filter, hostname, country, backward-compatible]
    sources:
      - "commit `642d879` (2026-06-23 : feat(ga4): add hostname and country filters)"
      - "src/gsc_mcp/tools/ga4.py"
    context: >
      Tous les outils GA4 acceptent hostname et country optionnels.
      _build_dimension_filter(hostname, country, base_filter) :
      retourne None si les deux sont None (compatible backward),
      un FilterExpression simple si un seul est défini,
      un AND group FilterExpressionList si les deux sont définis.
    applies_to: "Tous les outils GA4 + outils cross.py qui appellent des outils GA4."

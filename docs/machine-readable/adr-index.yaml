  - id: ADR-0010
    date: 2026-06-22
    criticite: C1
    domaine: Testing
    titre: Tests entièrement mockés : zéro appel réel à l'API Google
    tags: [testing, mocking, pytest, conftest, fixtures, google-api]
    sources:
      - "commit `8ac864d` (2026-06-22)"
      - "tests/conftest.py"
    context: >
      Deux fixtures partagées dans conftest.py :
      mock_gsc_service (MagicMock wirée pour sites/searchanalytics/sitemaps/urlInspection)
      et mock_indexing_service (MagicMock avec new_batch_http_request() synchrone).
      Tous les tests patchent le service au point d'appel (ex: gsc_mcp.tools.analytics.get_searchconsole_service).
    crux_pattern: "Patch httpx.Client en context manager (__enter__ retourne le mock lui-même)."
    sitemap_pattern: "Patch gsc_mcp.tools.sitemaps.httpx.Client ET gsc_mcp.tools.sitemaps.get_search_analytics (import module-level)."
    ga4_pattern: "Fixture autouse pour GA4_PROPERTY_ID."

  - id: ADR-0011
    date: 2026-06-23
    criticite: C3
    domaine: Distribution
    titre: Double entrypoint gsc-mcp et gsc-mcp-tools pour compatibilité uvx
    tags: [packaging, pypi, uvx, entrypoint, distribution, cli]
    sources:
      - "commit `c09e0ed` (2026-06-23 : chore: rename PyPI package)"
      - "commit `a3a60d1` (2026-06-24 : fix: add gsc-mcp-tools entrypoint so uvx gsc-mcp-tools works)"
      - "pyproject.toml"
    context: >
      Le package PyPI s'appelle gsc-mcp-tools (nom court déjà pris sur PyPI).
      uvx résout le nom du package, pas l'entrypoint. Pour que `uvx gsc-mcp-tools`
      fonctionne directement, les deux entrypoints pointent vers gsc_mcp.server:main.
    install_commands:
      - "uvx gsc-mcp-tools"
      - "pip install gsc-mcp-tools && gsc-mcp"


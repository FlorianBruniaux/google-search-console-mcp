  - id: ADR-0013
    date: 2026-06-24
    criticite: C2
    domaine: API
    titre: ga4_funnel utilise GA4 v1alpha RunFunnelReport API (service séparé)
    tags: [ga4, funnel, v1alpha, alpha-api, get_alpha_ga4_service, separate-service]
    sources:
      - "commit `bb01043` (2026-06-24 : feat: add get_alpha_ga4_service())"
